services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: newtsbot:latest
    container_name: newtsbot
    restart: unless-stopped

    # .env is loaded verbatim. YTDLP_PATH / FFMPEG_PATH are overridden
    # below so the image's Linux binaries are used regardless of what
    # the .env file says (it may contain Windows paths for local dev).
    env_file:
      - .env
    environment:
      YTDLP_PATH: /usr/local/bin/yt-dlp
      FFMPEG_PATH: /usr/bin/ffmpeg
      NODE_ENV: production

    volumes:
      - ./logs:/app/logs

    # Bot is an outbound-only client (UDP 9987 to TS3 server + TCP 10022
    # ServerQuery). No published ports needed.

    # Keep logs manageable
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    stop_grace_period: 15s
